<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来课堂助手 - 智能点名系统</title>
    <!-- 开启缓存 -->
    <meta http-equiv="Cache-Control" content="max-age=3600">
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="3600">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mammoth@1.4.18/mammoth.browser.min.js"></script>
    <!-- 引入 Papa Parse 库用于处理 CSV 文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <!-- 引入 xlsx 库用于处理 XLSX 文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- 预加载关键资源 -->
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style">
    <link rel="preload" href="https://unpkg.com/mammoth@1.4.18/mammoth.browser.min.js" as="script">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js" as="script">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" as="script">
    <style>
        @import url('https://fonts.googleapis.com/css2?family="Noto Sans SC", sans-serif; wght@400;500;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #020c1b 0%, #0a1a2f 100%);
            color: #e0e0e0;
        }

        .cyber-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }

        .cyber-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 243, 255, 0.2);
        }

        .neon-text {
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
        }

        .glow-effect {
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            }
            to {
                box-shadow: 0 0 30px rgba(0, 243, 255, 0.8);
            }
        }

        .slide-in {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .btn-cyber {
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid #00f3ff;
            color: #00f3ff;
            transition: all 0.3s;
        }

        .btn-cyber:hover {
            background: rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .btn-cyber.active {
            background: rgba(0, 243, 255, 0.3);
        }

        #nameDisplay {
            font-size: 100px;
            padding: 2rem;
            line-height: 1.5;
            border: 2px solid #00f3ff;
            border-radius: 0.5rem;
            box-sizing: border-box;
            min-height: 200px;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1) 0%, rgba(0, 102, 255, 0.1) 100%);
            overflow: hidden;
            white-space: nowrap;
        }

        @keyframes scaleAndGlow {
            0% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(0, 243, 255, 0.8);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            }
        }

        .selected-effect {
            animation: scaleAndGlow 0.5s ease-out;
        }

        .dropdown {
            position: relative;
            display: inline-block;
            z-index: 10;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: rgba(255, 255, 255, 0.05);
            min-width: 160px;
            box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
            z-index: 1000;
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 0.375rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .dropdown-content a {
            color: #e0e0e0;
            padding: 6px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: rgba(0, 243, 255, 0.1);
        }

        .title-bounce {
            animation: bounce 3s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .title-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .student-name {
                font-size: 2rem !important;
            }

            #nameDisplay {
                font-size: 2rem;
                min-height: 8rem;
            }

            .rollcall-controls {
                flex-direction: column;
                align-items: center;
            }

            .cyber-button {
                width: 100%;
            }
            
            .header-controls {
                flex-direction: column;
                gap: 0.5rem !important;
            }
            
            #classSelectDropdown, #sessionSelectDropdown {
                width: 100% !important;
            }
            
            .header-actions {
                width: 100%;
                display: flex;
                gap: 0.5rem;
            }
            
            #exportButton, #homeButton {
                width: 50% !important;
            }

            .header-controls-container {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        #nameDisplay:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .rollcall-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .speed-control {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #e2e8f0;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin: 15% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        .export-option {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s;
        }

        .export-option:hover {
            background: rgba(0, 243, 255, 0.1);
        }

        .export-option i {
            margin-right: 10px;
            font-size: 20px;
        }

        .score-editing-section {
            margin: 20px 0;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }

        .score-editing-title {
            margin-bottom: 10px;
            font-weight: bold;
            color: #00f3ff;
        }

        .confirm-modal {
            display: none;
            position: fixed;
            z-index: 1002;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }

        .confirm-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin: 15% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
        }

        .confirm-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .confirm-btn {
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .confirm-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .confirm-btn.confirm {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
        }

        .session-info {
            text-align: center;
            margin: 1rem 0;
            padding: 0.5rem;
            background-color: rgba(0, 243, 255, 0.1);
            border-radius: 0.5rem;
        }

        .session-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .session-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .session-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .session-dropdown {
            min-width: 150px;
        }
        
        .header-controls-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .header-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            flex: 1;
        }
        
        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 1rem;
        }
        
        #exportButton {
            white-space: nowrap;
        }
        
        #sessionSelectDropdown {
            width: auto;
        }
        
        .session-selection {
            margin: 1rem 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 5px;
            padding: 0.5rem;
        }
        
        .session-checkbox-item {
            display: flex;
            align-items: center;
            padding: 0.3rem 0;
        }
        
        .session-checkbox-item input {
            margin-right: 0.5rem;
        }
        
        .select-all-sessions {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        }

        .history-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }
        
        .history-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.1);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .history-student {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00f3ff;
        }
        
        .history-time {
            font-size: 0.8rem;
            color: #aaa;
        }
        
        .history-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #ddd;
        }

        .score-stat-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .score-stat-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.1);
        }
        
        .score-stat-name {
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .score-stat-value {
            font-size: 1.5rem;
            color: #00f3ff;
            margin-bottom: 0.5rem;
        }
        
        .score-stat-controls {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .score-stat-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid #00f3ff;
            color: #00f3ff;
            cursor: pointer;
        }
        
        .score-stat-btn:hover {
            background: rgba(0, 243, 255, 0.2);
        }

        .class-navigation {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
        }
        
        .class-nav-btn {
            padding: 0.5rem 1rem;
        }

        .dropdown.active .dropdown-content {
            display: block;
        }

        .filter-btn.active {
            background: rgba(0, 243, 255, 0.3);
        }
        
        .rollcall-pool-status {
            text-align: center;
            margin: 1rem 0;
            padding: 0.5rem;
            background-color: rgba(0, 243, 255, 0.1);
            border-radius: 0.5rem;
            font-size: 0.9rem;
        }
        
        #resetRollcallPoolBtn {
            margin-left: 1rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }
        
        .edit-btn {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.95); }
        }

        .name-flash {
            animation: flash 0.3s linear infinite;
        }

        @keyframes rapidScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }

        .rapid-scroll {
            animation: rapidScroll 0.05s linear infinite;
        }

        @keyframes roll {
            0% { transform: translateX(0); opacity: 0.8; }
            50% { transform: translateX(2px); opacity: 1; }
            100% { transform: translateX(0); opacity: 0.8; }
        }

        .rolling-effect {
            animation: roll 0.1s ease-in-out infinite;
            transition: all 0.05s;
        }

        .selected-effect {
            animation: highlight 0.5s ease-in-out;
        }

        @keyframes highlight {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(72, 187, 120, 0.5); }
            100% { transform: scale(1); }
        }

        @keyframes syncPulse {
            0% {
                background-color: rgba(0, 243, 255, 0.1);
                transform: scale(1);
            }
            50% {
                background-color: rgba(0, 243, 255, 0.3);
                transform: scale(1.02);
            }
            100% {
                background-color: rgba(0, 243, 255, 0.1);
                transform: scale(1);
            }
        }

        .sync-highlight {
            animation: syncPulse 1s ease-in-out;
        }

        .pool-indicator {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        
        .pool-good {
            background-color: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }
        
        .pool-warning {
            background-color: rgba(255, 255, 0, 0.2);
            color: #ffff00;
        }
        
        .pool-danger {
            background-color: rgba(255, 0, 0, 0.2);
            color: #ff0000;
        }

/* 添加下拉菜单分组样式 */
.dropdown-group-header {
    padding: 0.5rem 1rem;
    color: #9ca3af;
    font-weight: bold;
    font-size: 0.875rem;
    text-transform: uppercase;
    pointer-events: none;
}

.dropdown-item {
    padding: 0.5rem 1.5rem;
    color: #e5e7eb;
    display: block;
    transition: all 0.2s;
}

.dropdown-item:hover {
    background-color: rgba(0, 243, 255, 0.1);
    color: #00f3ff;
}

/* 修复下拉菜单z-index问题 */
.dropdown {
    position: relative;
    z-index: 50;
}

.dropdown-content {
    z-index: 50;
}

    </style>
</head>

<body class="min-h-screen py-8 px-4 sm:px-8 relative">
    <div class="header-controls-container">
        <div class="header-controls">
            <div class="dropdown" id="classSelectDropdown">
                <button class="btn-cyber rounded-lg py-3 px-4 cursor-pointer appearance-none flex items-center gap-2" id="classSelectBtn">
                    护理1班
                    <i class="fas fa-chevron-down text-xs"></i>
                </button>
                <div class="dropdown-content" id="classDropdownContent">
                </div>
            </div>
            
            <div class="dropdown" id="sessionSelectDropdown">
                <button class="btn-cyber rounded-lg py-3 px-4 cursor-pointer appearance-none flex items-center gap-2" id="sessionSelectBtn">
                    第1节课
                    <i class="fas fa-chevron-down text-xs"></i>
                </button>
                <div class="dropdown-content" id="sessionDropdownContent">
                </div>
            </div>
            
            <button id="createNewSessionBtn" class="btn-cyber rounded-lg py-3 px-4 font-medium bg-green-900/30 border-green-500 text-green-400">
                <i class="fas fa-plus mr-1"></i>新增节次
            </button>
        </div>
        
        <div class="header-actions">
            <button id="homeButton" class="btn-cyber rounded-lg py-3 px-4 font-medium">
                <i class="fas fa-home mr-2"></i>返回主页
            </button>
            <button id="exportButton" class="btn-cyber rounded-lg py-3 px-4 font-medium">
                <i class="fas fa-download mr-2"></i>导出数据
            </button>
        </div>
    </div>

    <div class="session-info cyber-card rounded-xl p-4">
        <h3 class="text-xl font-bold mb-2 text-[#00f3ff]">当前节次信息</h3>
        <div id="sessionDateTime" class="mt-2 text-sm text-gray-300">
            日期：<span id="currentDate"></span> 时间：<span id="currentTime"></span> 节次：<span id="currentSession"></span>
        </div>
    </div>

    <div class="title-container">
        <h1 class="text-[4.5rem] sm:text-[6rem] font-bold mb-4 neon-text text-[#00f3ff] title-bounce">课堂助手</h1>
        <p class="text-xl text-gray-300">智能点名与课堂互动系统</p>
    </div>
    <div class="max-w-4xl mx-auto">
        <div id="nameDisplay" class="glow-effect rounded-lg border-2 border-[#00f3ff] text-3xl sm:text-4xl font-bold p-6 mb-8 w-full" style="white-space: pre-wrap;">
            准备就绪
        </div>
        
        <!-- 点名池状态指示器 -->
        <div class="rollcall-pool-status" id="rollcallPoolStatus">
            点名池状态: 
            <span id="poolCountDisplay">所有学生都可被选中</span> 
            <button id="resetRollcallPoolBtn" class="btn-cyber rounded px-2 py-1 text-sm">重置点名池</button>
        </div>

        <div class="grid grid-cols-2 sm:grid-ccols-4 gap-4 mb-8">
            <select id="rollcallCountSelect" class="btn-cyber rounded-lg py-3 px-4 cursor-pointer appearance-none">
                <option value="1">单人模式</option>
                <option value="2">双人模式</option>
                <option value="3">三人模式</option>
            </select>

            <button id="actionBtn" class="btn-cyber rounded-lg py-3 px-4 font-medium">
                <i class="fas fa-rocket mr-2"></i>开始提问
            </button>

            <button id="addScoreBtn" class="btn-cyber rounded-lg py-3 px-4 font-medium">
                <i class="fas fa-star mr-2"></i>点击加一分
            </button>

            <div class="relative">
                <input type="file" id="fileInput" class="hidden" accept=".txt,.docx,.csv,.xlsx">
                <button onclick="document.getElementById('fileInput').click()" class="btn-cyber rounded-lg py-3 px-4 font-medium w-full">
                    <i class="fas fa-file-upload mr-2"></i>名单上传
                </button>
            </div>
        </div>
        
        <!-- 音色选择下拉菜单 -->
        <div class="relative inline-block w-full mb-8">
            <select id="voiceSelect" class="btn-cyber rounded-lg py-3 px-4 cursor-pointer appearance-none w-full">
                <!-- 默认音色选项 -->
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                <i class="fas fa-chevron-down text-sm"></i>
            </div>
        </div>
    </div>

    <div class="cyber-card rounded-xl p-6">
        <h3 class="text-xl font-bold mb-4 text-[#00f3ff] flex items-center">
            <i class="fas fa-chart-line mr-3"></i>学分统计
        </h3>
        <div id="scoreBoard" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
            <div class="text-center py-2 px-4 bg-gray-800 rounded-lg">
                <p class="font-medium">暂无加分记录</p>
                <p class="text-sm text-gray-400">请先进行加分操作</p>
            </div>
        </div>
    </div>

    <div class="cyber-card rounded-xl p-6">
        <h3 class="text-xl font-bold mb-4 text-[#00f3ff] flex items-center">
            <i class="fas fa-microphone-alt mr-3"></i>语音控制
        </h3>
        <button id="voiceToggle" class="btn-cyber rounded-lg py-2 px-4 font-medium mb-4">
            <i class="fas fa-volume-up mr-2"></i>语音播报
        </button>
        <p class="text-gray-300">启用语音功能后，系统将自动播报点名结果和加分情况。</p>

        // 初始化班级数据
        function initializeClasses() {
            for (let i = 0; i < allClassNames.length; i++) {
                const className = allClassNames[i];
                const students = [];
                
                // 检查是否有预定义的学生名单
                if (predefinedStudents[className]) {
                    // 使用预定义名单
                    predefinedStudents[className].forEach((name, index) => {
                        const classNumber = className.replace(/\D/g, '');
                        const studentId = `202${classNumber ? classNumber.padStart(2, '0') : '00'}${String(index + 1).padStart(2, '0')}`;
                        
                        students.push({
                            id: studentId,
                            name: name,
                            status: 'present',
                            totalScore: 0,
                            rollcallCount: 0,
                            lastRollcalled: null
                        });
                    });
                }
                
                appData.classes[className] = {
                    students: students,
                    sessions: {
                        '第1节课': {
                            date: new Date().toLocaleDateString(),
                            time: new Date().toLocaleTimeString(),
                            attendance: students.reduce((acc, student) => {
                                acc[student.id] = {
                                    status: student.status,
                                    score: 0,
                                    scoreChanges: []
                                };
                                return acc;
                            }, {})
                        }
                    },
                    rollcallHistory: []
                };
            }
            
            resetRollcallPool();
        }

        // 重置点名池
        function resetRollcallPool() {
            const currentClassData = appData.classes[appData.currentClass];
            if (currentClassData && currentClassData.students) {
                const sessionData = currentClassData.sessions[appData.currentSession];
                
                appData.rollcallPool = currentClassData.students
                    .filter(student => {
                        const attendance = sessionData.attendance[student.id];
                        return attendance ? attendance.status === 'present' : student.status === 'present';
                    })
                    .map(student => student.id);
                
                updateRollcallPoolStatus();
            }
        }

        // 更新点名池状态显示
        function updateRollcallPoolStatus() {
            const currentClassData = appData.classes[appData.currentClass];
            const sessionData = currentClassData.sessions[appData.currentSession];
            
            const totalStudents = currentClassData.students
                .filter(student => {
                    const attendance = sessionData.attendance[student.id];
                    return attendance ? attendance.status === 'present' : student.status === 'present';
                }).length;
                
            const remainingStudents = appData.rollcallPool.length;
            
            // 添加视觉状态指示器
            let poolStatusClass = 'pool-good';
            let statusText = '充足';
            if (remainingStudents < totalStudents * 0.3) {
                poolStatusClass = 'pool-danger';
                statusText = '不足';
            } else if (remainingStudents < totalStudents * 0.6) {
                poolStatusClass = 'pool-warning';
                statusText = '紧张';
            }
            
            const statusElement = document.getElementById('rollcallPoolStatus');
            statusElement.innerHTML = `点名池状态: 剩余 ${remainingStudents}/${totalStudents} 名学生可被选中 
                <span class="pool-indicator ${poolStatusClass}">${statusText}</span>
                <button id="resetRollcallPoolBtn" class="btn-cyber rounded px-2 py-1 text-sm">重置点名池</button>`;
            
            // 重新绑定重置按钮事件
            document.getElementById('resetRollcallPoolBtn').addEventListener('click', resetRollcallPool);
        }

        // 开始滚动点名
        function startRolling(count) {
            appData.isRolling = true;
            elements.actionBtn.innerHTML = '<i class="fas fa-stop mr-2"></i>停止';
            elements.actionBtn.classList.add('bg-red-500');
            elements.actionBtn.classList.remove('btn-cyber');
            
            const nameDisplay = document.getElementById('nameDisplay');
            nameDisplay.classList.add('name-flash');

            // 最快速度滚动（50ms间隔）
            appData.rollInterval = setInterval(() => {
                let displayText = '';
                const currentClassData = appData.classes[appData.currentClass];
                
                if (!currentClassData || !currentClassData.students.length) {
                    clearInterval(appData.rollInterval);
                    return;
                }
                
                // 随机显示学生姓名
                const tempSelected = [];
                for (let i = 0; i < count; i++) {
                    const randomIndex = Math.floor(Math.random() * currentClassData.students.length);
                    const student = currentClassData.students[randomIndex];
                    tempSelected.push(student);
                    displayText += student.name + (i < count - 1 ? '\n' : '');
                }
                
                nameDisplay.textContent = displayText;
                
            }, 50);
        }

        // 停止滚动点名
        function stopRolling(count) {
            appData.isRolling = false;
            clearInterval(appData.rollInterval);
            
            // 恢复按钮样式
            elements.actionBtn.innerHTML = '<i class="fas fa-rocket mr-2"></i>开始提问';
            elements.actionBtn.classList.remove('bg-red-500');
            elements.actionBtn.classList.add('btn-cyber');
            
            // 移除动画效果
            const nameDisplay = document.getElementById('nameDisplay');
            nameDisplay.classList.remove('name-flash');
            
            // 显示最终选择结果
            const finalSelected = selectRandomStudents(count);
            
            // 添加选中效果
            nameDisplay.classList.add('selected-effect');
            setTimeout(() => {
                nameDisplay.classList.remove('selected-effect');
            }, 1000);
        }

        // 随机选择学生
        function selectRandomStudents(count = 1) {
            const currentClassData = appData.classes[appData.currentClass];
            if (!currentClassData || !currentClassData.students || currentClassData.students.length === 0) {
                elements.nameDisplay.textContent = '请先添加学生';
                return [];
            }
            
            // 检查点名池是否有足够学生
            if (appData.rollcallPool.length === 0) {
                resetRollcallPool();
                if (appData.rollcallPool.length === 0) {
                    elements.nameDisplay.textContent = '没有可点名的学生';
                    speak('没有可点名的学生');
                    return [];
                }
            }
            
            const selectedStudents = [];
            
            // 随机选择指定数量的学生（不超过点名池人数）
            const selectCount = Math.min(count, appData.rollcallPool.length);
            
            for (let i = 0; i < selectCount; i++) {
                const randomIndex = Math.floor(Math.random() * appData.rollcallPool.length);
                const studentId = appData.rollcallPool[randomIndex];
                
                // 从点名池中移除已选中的学生
                appData.rollcallPool.splice(randomIndex, 1);
                
                // 查找学生信息
                const student = currentClassData.students.find(s => s.id === studentId);
                if (student) {
                    selectedStudents.push(student);
                    
                    // 更新点名次数
                    student.rollcallCount++;
                    student.lastRollcalled = new Date();
                }
            }
            
            // 记录点名历史（多人模式）
            if (selectedStudents.length > 0) {
                const historyEntry = {
                    time: new Date(),
                    session: appData.currentSession,
                    students: selectedStudents.map(s => ({
                        id: s.id,
                        name: s.name
                    }))
                };
                
                currentClassData.rollcallHistory.unshift(historyEntry);
                
                // 限制历史记录数量
                if (currentClassData.rollcallHistory.length > 100) {
                    currentClassData.rollcallHistory.pop();
                }
            }
            
            // 更新点名池状态
            updateRollcallPoolStatus();
            
            // 显示选中的学生
            if (selectedStudents.length > 0) {
                const names = selectedStudents.map(s => s.name).join('\n');
                elements.nameDisplay.textContent = names;
                elements.nameDisplay.classList.add('selected-effect');
                
                // 移除动画类，以便下次可以重新触发
                setTimeout(() => {
                    elements.nameDisplay.classList.remove('selected-effect');
                }, 500);
                
                // 语音播报
                if (selectedStudents.length === 1) {
                    speak(`选中的学生是：${selectedStudents[0].name}`);
                } else {
                    const namesList = selectedStudents.map(s => s.name).join('，');
                    speak(`选中的学生是：${namesList}`);
                }
                
                // 更新界面
                renderScoreBoard();
                renderHistoryList();
            }
            
            return selectedStudents;
        }

        // 处理文件上传
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileName = file.name;
            const fileExtension = fileName.split('.').pop().toLowerCase();

            if (fileExtension === 'txt') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    const names = content.split(/[\r\n]+/).filter(name => name.trim() !== '');
                    importStudentsFromNames(names);
                };
                reader.readAsText(file);
            } else if (fileExtension === 'docx') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    mammoth.extractRawText({arrayBuffer: arrayBuffer})
                        .then(function(result) {
                            const text = result.value;
                            const names = text.split(/[\r\n]+/).filter(name => name.trim() !== '');
                            importStudentsFromNames(names);
                        })
                        .done();
                };
                reader.readAsArrayBuffer(file);
            } else if (fileExtension === 'csv') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    const results = Papa.parse(content, {header: false});
                    const names = results.data.map(row => row[0]).filter(name => name && name.trim() !== '');
                    importStudentsFromNames(names);
                };
                reader.readAsText(file);
            } else if (fileExtension === 'xlsx' || fileExtension === 'xls') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);

                    let names;
                    if (jsonData.length > 0 && typeof jsonData[0] === 'object') {
                        const firstKey = Object.keys(jsonData[0])[0];
                        names = jsonData.map(item => item[firstKey]).filter(name => name && name.toString().trim() !== '');
                    } else {
                        names = jsonData.map(item => Array.isArray(item) ? item[0] : item)
                            .filter(name => name && name.toString().trim() !== '');
                    }

                    importStudentsFromNames(names);
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('不支持的文件格式，请上传txt、docx、csv或Excel文件');
            }

            elements.fileInput.value = '';
        }

        // 从姓名列表导入学生
        function importStudentsFromNames(names) {
            if (names.length === 0) {
                alert('未找到有效的学生姓名');
                return;
            }

            const currentClassData = appData.classes[appData.currentClass];
            if (!currentClassData) return;

            let newCount = 0;

            names.forEach(name => {
                const trimmedName = name.trim();
                if (!trimmedName) return;

                const exists = currentClassData.students.some(student => 
                    student.name.trim() === trimmedName
                );

                if (!exists) {
                    const timestamp = new Date().getTime();
                    const classNumber = appData.currentClass.replace(/\D/g, '');
                    const randomNum = Math.floor(Math.random() * 1000);
                    const studentId = `IM${classNumber}${timestamp}${randomNum}`;

                    const newStudent = {
                        id: studentId,
                        name: trimmedName,
                        status: 'present',
                        totalScore: 0,
                        rollcallCount: 0,
                        lastRollcalled: null
                    };

                    currentClassData.students.push(newStudent);

                    Object.values(currentClassData.sessions).forEach(session => {
                        session.attendance[studentId] = {
                            status: 'present',
                            score: 0,
                            scoreChanges: []
                        };
                    });

                    appData.rollcallPool.push(studentId);
                    newCount++;
                }
            });

            updateRollcallPoolStatus();
            renderScoreBoard();

            speak(`成功导入${newCount}名新学生`);
            alert(`成功导入${newCount}名新学生，已有${currentClassData.students.length}名学生`);
        }

        // 为选中的学生加分
        function addScoreToSelectedStudent(points = 1) {
            const currentClassData = appData.classes[appData.currentClass];
            if (!currentClassData) return;

            const sessionData = currentClassData.sessions[appData.currentSession];
            if (!sessionData) return;

            const displayedNames = elements.nameDisplay.textContent.split('\n');
            if (displayedNames.length === 0 || displayedNames[0] === '准备就绪' || displayedNames[0] === '请先添加学生') {
                return;
            }

            displayedNames.forEach(name => {
                const student = currentClassData.students.find(s => s.name === name.trim());
                if (student) {
                    if (!sessionData.attendance[student.id]) {
                        sessionData.attendance[student.id] = {
                            status: student.status,
                            score: 0,
                            scoreChanges: []
                        };
                    }

                    sessionData.attendance[student.id].score += points;
                    sessionData.attendance[student.id].scoreChanges.push({
                        points: points,
                        time: new Date()
                    });

                    student.totalScore += points;

                    speak(`${student.name}本节加分${points}分，本节总分${sessionData.attendance[student.id].score}分，累计总学分${student.totalScore}分`);
                }
            });

            renderScoreBoard();
        }

        // 渲染学分看板
        function renderScoreBoard() {
            const currentClassData = appData.classes[appData.currentClass];
            if (!currentClassData || !currentClassData.students) {
                elements.scoreBoard.innerHTML = `
                    <div class="text-center py-2 px-4 bg-gray-800 rounded-lg">
                        <p class="font-medium">暂无加分记录</p>
                        <p class="text-sm text-gray-400">请先进行加分操作</p>
                    </div>
                `;
                return;
            }

            const sessionData = currentClassData.sessions[appData.currentSession];
            if (!sessionData) return;

            const studentsWithScores = [...currentClassData.students]
                .filter(student => {
                    const attendance = sessionData.attendance[student.id];
                    return attendance && attendance.score > 0;
                })
                .sort((a, b) => {
                    const scoreA = sessionData.attendance[a.id].score;
                    const scoreB = sessionData.attendance[b.id].score;
                    return scoreB - scoreA;
                });

            if (studentsWithScores.length === 0) {
                elements.scoreBoard.innerHTML = `
                    <div class="text-center py-2 px-4 bg-gray-800 rounded-lg">
                        <p class="font-medium">暂无加分记录</p>
                        <p class="text-sm text-gray-400">请先进行加分操作</p>
                    </div>
                `;
                return;
            }

            let scoreBoardHTML = '';
            studentsWithScores.forEach(student => {
                const score = sessionData.attendance[student.id].score;

                scoreBoardHTML += `
                    <div class="score-stat-item">
                        <div class="score-stat-name">${student.name}</div>
                        <div class="score-stat-value">${score}</div>
                        <div class="score-stat-controls">
                            <button class="score-stat-btn decrease-score" data-id="${student.id}">
                                <i class="fas fa-minus text-xs"></i>
                            </button>
                            <button class="score-stat-btn increase-score" data-id="${student.id}">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            elements.scoreBoard.innerHTML = scoreBoardHTML;

            document.querySelectorAll('.increase-score').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const studentId = btn.dataset.id;
                    const student = currentClassData.students.find(s => s.id === studentId);
                    if (student) {
                        if (!sessionData.attendance[studentId]) {
                            sessionData.attendance[studentId] = {
                                status: student.status,
                                score: 0,
                                scoreChanges: []
                            };
                        }

                        sessionData.attendance[studentId].score += 1;
                        sessionData.attendance[studentId].scoreChanges.push({
                            points: 1,
                            time: new Date()
                        });

                        student.totalScore += 1;

                        renderScoreBoard();
                        speak(`${student.name}加分1分，本节总分${sessionData.attendance[studentId].score}分，累计总学分${student.totalScore}分`);
                    }
                });
            });

            document.querySelectorAll('.decrease-score').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const studentId = btn.dataset.id;
                    const student = currentClassData.students.find(s => s.id === studentId);

                    if (student) {
                        if (!sessionData.attendance[studentId]) {
                            return;
                        }

                        if (sessionData.attendance[studentId].score > 0) {
                            sessionData.attendance[studentId].score -= 1;
                            sessionData.attendance[studentId].scoreChanges.push({
                                points: -1,
                                time: new Date()
                            });

                            student.totalScore -= 1;

                            renderScoreBoard();
                            speak(`${student.name}减分1分，本节总分${sessionData.attendance[studentId].score}分，累计总学分${student.totalScore}分`);
                        }
                    }
                });
            });
        }

        // 创建新节次
        function createNewSession() {
            const currentClassData = appData.classes[appData.currentClass];
            if (!currentClassData) return;

            const sessionNumbers = Object.keys(currentClassData.sessions)
                .map(session => parseInt(session.replace(/\D/g, '')))
                .sort((a, b) => a - b);

            const newSessionNumber = sessionNumbers.length > 0 ? sessionNumbers[sessionNumbers.length - 1] + 1 : 1;
            const newSessionName = `第${newSessionNumber}节课`;

            const now = new Date();
            currentClassData.sessions[newSessionName] = {
                date: now.toLocaleDateString(),
                time: now.toLocaleTimeString(),
                attendance: currentClassData.students.reduce((acc, student) => {
                    acc[student.id] = {
                        status: student.status,
                        score: 0,
                        scoreChanges: []
                    };
                    return acc;
                }, {})
            };

            appData.currentSession = newSessionName;
            elements.sessionSelectBtn.innerHTML = `${newSessionName} <i class="fas fa-chevron-down text-xs"></i>`;

            initSessionDropdown();
            initExportSessionSelection();
            updateSessionInfo();
            renderScoreBoard();
            resetRollcallPool();

            speak(`已创建新节次${newSessionName}`);
        }

        // 导出数据
        function exportData() {
            const exportType = elements.exportTypeSelect.value;
            const selectedSessions = Array.from(
                document.querySelectorAll('#exportSessionSelection input[type="checkbox"]:checked')
            ).map(checkbox => checkbox.value);

            if (selectedSessions.length === 0) {
                alert('请至少选择一个节次');
                return;
            }

            const wb = XLSX.utils.book_new();
            const currentClassData = appData.classes[appData.currentClass];
            const className = appData.currentClass;

            if (exportType === 'scores' || exportType === 'all') {
                const scoreData = currentClassData.students.map(student => ({
                    '班级': className,
                    '学号': student.id,
                    '姓名': student.name,
                    '累计总学分': student.totalScore,
                    '总点名次数': student.rollcallCount
                }));

                selectedSessions.forEach(sessionName => {
                    const sessionData = currentClassData.sessions[sessionName];
                    scoreData.forEach(student => {
                        student[sessionName] = sessionData.attendance[student.学号]?.score || 0;
                    });
                });

                const ws = XLSX.utils.json_to_sheet(scoreData);
                XLSX.utils.book_append_sheet(wb, ws, `${className}_学分数据`);
            }

            if (exportType === 'attendance' || exportType === 'all') {
                const attendanceData = currentClassData.students.map(student => ({
                    '班级': className,
                    '学号': student.id,
                    '姓名': student.name
                }));

                selectedSessions.forEach(sessionName => {
                    const sessionData = currentClassData.sessions[sessionName];
                    attendanceData.forEach(student => {
                        const attendance = sessionData.attendance[student.学号] || {};
                        const status = attendance.status || student.status;
                        student[sessionName] = statusMap[status] || '未知';
                    });
                });

                const ws = XLSX.utils.json_to_sheet(attendanceData);
                XLSX.utils.book_append_sheet(wb, ws, `${className}_出勤记录`);
            }

            if (exportType === 'total_statistics' || exportType === 'all') {
                const statsData = selectedSessions.map(sessionName => {
                    const sessionData = currentClassData.sessions[sessionName];
                    const statusCount = {
                        'present': 0,
                        'absent': 0,
                        'leave': 0,
                        'late': 0,
                        'withdrawn': 0
                    };

                    let totalScore = 0;
                    let studentWithScores = 0;

                    currentClassData.students.forEach(student => {
                        const attendance = sessionData.attendance[student.id] || {};
                        const status = attendance.status || student.status;
                        statusCount[status]++;
                        
                        if (attendance.score) {
                            totalScore += attendance.score;
                            studentWithScores++;
                        }
                    });

                    const avgScore = studentWithScores > 0 
                        ? (totalScore / studentWithScores).toFixed(1) 
                        : 0;

                    return {
                        '班级': className,
                        '节次': sessionName,
                        '日期': sessionData.date,
                        '总人数': currentClassData.students.length,
                        '出勤': statusCount.present,
                        '旷课': statusCount.absent,
                        '请假': statusCount.leave,
                        '迟到': statusCount.late,
                        '出勤率': ((statusCount.present / currentClassData.students.length) * 100).toFixed(2) + '%',
                        '总学分': totalScore,
                        '平均学分': avgScore
                    };
                });

                const ws = XLSX.utils.json_to_sheet(statsData);
                XLSX.utils.book_append_sheet(wb, ws, `${className}_汇总数据`);
            }

            const now = new Date();
            const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
            const timeStr = now.toTimeString().slice(0, 8).replace(/:/g, '');
            const fileName = `${className}_${exportType}_${dateStr}_${timeStr}.xlsx`;

            XLSX.writeFile(wb, fileName);

            elements.exportModal.style.display = 'none';
            elements.exportSuccessModal.style.display = 'block';
        }

        // 加载语音选项
        function loadVoiceOptions() {
            const voices = [
                { name: '默认女声', lang: 'zh-CN' },
                { name: '默认男声', lang: 'zh-CN' },
                { name: '英语女声', lang: 'en-US' }
            ];

            let voiceHTML = '';
            voices.forEach((voice, index) => {
                voiceHTML += `<option value="${index}">${voice.name} (${voice.lang})</option>`;
            });

            elements.voiceSelect.innerHTML = voiceHTML;
            appData.selectedVoice = 0;
        }

        // 语音播报
        function speak(text) {
            if (!appData.voiceEnabled) return;

            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                
                if (appData.selectedVoice !== null && speechSynthesis.getVoices().length > 0) {
                    const voices = speechSynthesis.getVoices();
                    utterance.voice = voices[appData.selectedVoice % voices.length];
                }
                
                speechSynthesis.speak(utterance);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
